<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flag Hunt Radar</title>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
    margin:0;
    padding:20px;
}

h1{
    color:#00ff88;
}

#radarContainer{
    width:300px;
    height:300px;
    margin:20px auto;
    position:relative;
}

#radar{
    width:100%;
    height:100%;
    border:3px solid #00ff88;
    border-radius:50%;
    position:relative;
    overflow:hidden;
}

.ring{
    position:absolute;
    border:1px solid rgba(0,255,136,0.3);
    border-radius:50%;
}

.r1{
    width:100px;
    height:100px;
    top:100px;
    left:100px;
}

.r2{
    width:200px;
    height:200px;
    top:50px;
    left:50px;
}

#lineV{
    position:absolute;
    width:1px;
    height:100%;
    background:rgba(0,255,136,.3);
    left:50%;
}

#lineH{
    position:absolute;
    height:1px;
    width:100%;
    background:rgba(0,255,136,.3);
    top:50%;
}

#player{
    width:14px;
    height:14px;
    background:#00ff88;
    border-radius:50%;
    position:absolute;
    left:143px;
    top:143px;
}

#flag{
    width:16px;
    height:16px;
    background:red;
    border-radius:50%;
    position:absolute;
}

.info{
    margin-top:15px;
    font-size:20px;
}

#status{
    font-size:24px;
    margin:15px;
}
</style>
</head>
<body>

<h1>🏁 Flag Hunt Radar</h1>

<div id="radarContainer">
    <div id="radar">

        <div class="ring r1"></div>
        <div class="ring r2"></div>

        <div id="lineV"></div>
        <div id="lineH"></div>

        <div id="player"></div>
        <div id="flag"></div>

    </div>
</div>

<div id="status">Getting GPS...</div>

<div class="info">
    Distance: <span id="distance">--</span>
</div>

<div class="info">
    Direction: <span id="direction">--</span>
</div>

<div class="info">
    Heading: <span id="heading">--</span>°
</div>

<script>

let playerLat;
let playerLon;

let flagLat = null;
let flagLon = null;

let heading = 0;

const CAPTURE_RADIUS = 10;

function distance(lat1, lon1, lat2, lon2){

    const R = 6371000;

    const dLat=(lat2-lat1)*Math.PI/180;
    const dLon=(lon2-lon1)*Math.PI/180;

    const a=
        Math.sin(dLat/2)**2+
        Math.cos(lat1*Math.PI/180)*
        Math.cos(lat2*Math.PI/180)*
        Math.sin(dLon/2)**2;

    const c=2*Math.atan2(
        Math.sqrt(a),
        Math.sqrt(1-a)
    );

    return R*c;
}

function bearing(lat1, lon1, lat2, lon2){

    const y =
        Math.sin((lon2-lon1)*Math.PI/180) *
        Math.cos(lat2*Math.PI/180);

    const x =
        Math.cos(lat1*Math.PI/180) *
        Math.sin(lat2*Math.PI/180)
        -
        Math.sin(lat1*Math.PI/180) *
        Math.cos(lat2*Math.PI/180) *
        Math.cos((lon2-lon1)*Math.PI/180);

    let brng =
        Math.atan2(y,x) *
        180/Math.PI;

    return (brng+360)%360;
}

function directionText(deg){

    const dirs = [
        "N","NE","E","SE",
        "S","SW","W","NW"
    ];

    return dirs[
        Math.round(deg/45)%8
    ];
}

function updateRadar(){

    if(
        playerLat===undefined ||
        flagLat===null
    ) return;

    const dist =
        distance(
            playerLat,
            playerLon,
            flagLat,
            flagLon
        );

    const flagBearing =
        bearing(
            playerLat,
            playerLon,
            flagLat,
            flagLon
        );

    document.getElementById(
        "distance"
    ).innerText =
        Math.round(dist)+" m";

    document.getElementById(
        "direction"
    ).innerText =
        directionText(flagBearing);

    const relative =
        (flagBearing-heading+360)%360;

    const radians =
        relative*Math.PI/180;

    const maxRadius = 120;

    const radarDistance =
        Math.min(
            maxRadius,
            dist/3
        );

    const x =
        150 +
        radarDistance *
        Math.sin(radians);

    const y =
        150 -
        radarDistance *
        Math.cos(radians);

    const flag =
        document.getElementById(
            "flag"
        );

    flag.style.left =
        (x-8)+"px";

    flag.style.top =
        (y-8)+"px";

    if(
        dist <= CAPTURE_RADIUS
    ){
        document.getElementById(
            "status"
        ).innerHTML =
            "🏆 FLAG CAPTURED!";
    }
    else{
        document.getElementById(
            "status"
        ).innerHTML =
            "🚶 Move toward the red dot";
    }
}

navigator.geolocation.watchPosition(

position=>{

    playerLat =
        position.coords.latitude;

    playerLon =
        position.coords.longitude;

    if(flagLat===null){

        const latOffset =
            (Math.random()-0.5)
            *0.004;

        const lonOffset =
            (Math.random()-0.5)
            *0.004;

        flagLat =
            playerLat +
            latOffset;

        flagLon =
            playerLon +
            lonOffset;
    }

    updateRadar();

},

err=>{
    alert(
        "Location permission required"
    );
},

{
enableHighAccuracy:true,
maximumAge:0,
timeout:10000
}
);

window.addEventListener(
"deviceorientationabsolute",
event=>{

    if(
        event.alpha !== null
    ){

        heading =
            360 -
            event.alpha;

        document.getElementById(
            "heading"
        ).innerText =
            Math.round(
                heading
            );

        updateRadar();
    }
}
);

window.addEventListener(
"deviceorientation",
event=>{

    if(
        event.alpha !== null
    ){

        heading =
            360 -
            event.alpha;

        document.getElementById(
            "heading"
        ).innerText =
            Math.round(
                heading
            );

        updateRadar();
    }
}
);

</script>

</body>
</html>
