<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flag Hunt Prototype</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}

.container{
    padding:20px;
}

#arrow{
    font-size:100px;
    margin:10px 0;
    transition:transform .3s linear;
}

#radar{
    width:300px;
    height:300px;
    margin:20px auto;
    border:3px solid #00ff88;
    border-radius:50%;
    position:relative;
    background:#181818;
}

.ring{
    position:absolute;
    border:1px solid rgba(0,255,136,.3);
    border-radius:50%;
}

.r1{
    width:100px;
    height:100px;
    left:98px;
    top:98px;
}

.r2{
    width:200px;
    height:200px;
    left:48px;
    top:48px;
}

.crossH{
    position:absolute;
    width:100%;
    height:1px;
    background:rgba(0,255,136,.3);
    top:50%;
}

.crossV{
    position:absolute;
    height:100%;
    width:1px;
    background:rgba(0,255,136,.3);
    left:50%;
}

#player{
    width:14px;
    height:14px;
    background:#00ff88;
    border-radius:50%;
    position:absolute;
    left:143px;
    top:143px;
}

#flag{
    width:16px;
    height:16px;
    background:red;
    border-radius:50%;
    position:absolute;
}

.label{
    position:absolute;
    color:#00ff88;
    font-weight:bold;
}

.n{top:5px;left:145px;}
.s{bottom:5px;left:145px;}
.e{right:8px;top:145px;}
.w{left:8px;top:145px;}

#distance{
    font-size:40px;
    color:#00ff88;
}

#status{
    font-size:24px;
    margin-top:15px;
}
</style>
</head>
<body>

<div class="container">

<h1>🏁 Flag Hunt</h1>

<div id="arrow">⬆</div>

<div id="radar">

    <div class="ring r1"></div>
    <div class="ring r2"></div>

    <div class="crossH"></div>
    <div class="crossV"></div>

    <div class="label n">N</div>
    <div class="label s">S</div>
    <div class="label e">E</div>
    <div class="label w">W</div>

    <div id="player"></div>
    <div id="flag"></div>

</div>

<div id="distance">-- m</div>

<div id="status">
Getting GPS...
</div>

</div>

<script>

let playerLat;
let playerLon;

let flagLat = null;
let flagLon = null;

let heading = 0;

const CAPTURE_RADIUS = 10;

function toRad(v){
    return v*Math.PI/180;
}

function distance(
lat1,lon1,
lat2,lon2
){

    const R=6371000;

    const dLat=
    toRad(lat2-lat1);

    const dLon=
    toRad(lon2-lon1);

    const a=
    Math.sin(dLat/2)**2+
    Math.cos(toRad(lat1))*
    Math.cos(toRad(lat2))*
    Math.sin(dLon/2)**2;

    const c=
    2*Math.atan2(
    Math.sqrt(a),
    Math.sqrt(1-a)
    );

    return R*c;
}

function bearing(
lat1,lon1,
lat2,lon2
){

    const y=
    Math.sin(
    toRad(lon2-lon1)
    )*
    Math.cos(
    toRad(lat2)
    );

    const x=
    Math.cos(
    toRad(lat1)
    )*
    Math.sin(
    toRad(lat2)
    )
    -
    Math.sin(
    toRad(lat1)
    )*
    Math.cos(
    toRad(lat2)
    )*
    Math.cos(
    toRad(lon2-lon1)
    );

    let brng=
    Math.atan2(y,x)*
    180/Math.PI;

    return (brng+360)%360;
}

function updateUI(){

    if(
    playerLat===undefined ||
    flagLat===null
    ) return;

    const dist=
    distance(
    playerLat,
    playerLon,
    flagLat,
    flagLon
    );

    document
    .getElementById(
    "distance"
    )
    .innerText=
    Math.round(dist)+" m";

    const flagBearing=
    bearing(
    playerLat,
    playerLon,
    flagLat,
    flagLon
    );

    /* Arrow */

    const relative=
    (flagBearing-heading+360)%360;

    document
    .getElementById(
    "arrow"
    )
    .style.transform=
    `rotate(${relative}deg)`;

    /* Fixed radar */

    const radarRadius=120;

    const displayDistance=
    Math.min(
    radarRadius,
    dist/2
    );

    const radians=
    flagBearing*
    Math.PI/180;

    const x=
    150+
    displayDistance*
    Math.sin(radians);

    const y=
    150-
    displayDistance*
    Math.cos(radians);

    const flag=
    document
    .getElementById(
    "flag"
    );

    flag.style.left=
    (x-8)+"px";

    flag.style.top=
    (y-8)+"px";

    if(
    dist<=CAPTURE_RADIUS
    ){

        document
        .getElementById(
        "status"
        )
        .innerHTML=
        "🏆 FLAG CAPTURED!";

    }else{

        document
        .getElementById(
        "status"
        )
        .innerHTML=
        "🚶 Follow the arrow";
    }
}

/* Compass */

window.addEventListener(
"deviceorientation",
e=>{

    if(
    e.alpha!=null
    ){

        heading=
        360-e.alpha;

        updateUI();
    }

},
true
);

/* GPS */

navigator.geolocation.watchPosition(

pos=>{

    playerLat=
    pos.coords.latitude;

    playerLon=
    pos.coords.longitude;

    if(
    flagLat===null
    ){

        const angle=
        Math.random()*360;

        const meters=
        100+
        Math.random()*100;

        const dLat=
        (meters/111111)*
        Math.cos(
        angle*
        Math.PI/180
        );

        const dLon=
        (meters/
        (111111*
        Math.cos(
        playerLat*
        Math.PI/180
        )))*
        Math.sin(
        angle*
        Math.PI/180
        );

        flagLat=
        playerLat+dLat;

        flagLon=
        playerLon+dLon;

        console.log(
        "Flag:",
        flagLat,
        flagLon
        );
    }

    updateUI();

},

err=>{

    document
    .getElementById(
    "status"
    )
    .innerHTML=
    "Location permission required";

},

{
enableHighAccuracy:true,
maximumAge:0,
timeout:10000
}
);

</script>

</body>
</html>
