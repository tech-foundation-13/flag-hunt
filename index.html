<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flag Hunt Test</title>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
    padding:20px;
}

.card{
    max-width:500px;
    margin:auto;
    background:#222;
    padding:20px;
    border-radius:15px;
}

h1{
    color:#00ff88;
}

#distance{
    font-size:48px;
    margin:20px 0;
    color:#00ff88;
}

#status{
    font-size:24px;
    margin:20px 0;
}

.info{
    color:#aaa;
    margin-top:15px;
    word-break:break-word;
}
</style>
</head>
<body>

<div class="card">
    <h1>🏁 Flag Hunt</h1>

    <div id="status">Getting GPS...</div>

    <div>Distance To Flag</div>
    <div id="distance">--</div>

    <div class="info" id="coords"></div>
</div>

<script>

let flagLat = null;
let flagLon = null;

const CAPTURE_RADIUS = 10;

function calculateDistance(lat1, lon1, lat2, lon2) {

    const R = 6371000;

    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;

    const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) *
        Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLon / 2) *
        Math.sin(dLon / 2);

    const c = 2 * Math.atan2(
        Math.sqrt(a),
        Math.sqrt(1 - a)
    );

    return R * c;
}

if (!navigator.geolocation) {

    document.getElementById("status").innerText =
        "GPS not supported";

} else {

    navigator.geolocation.watchPosition(

        function(position) {

            const lat = position.coords.latitude;
            const lon = position.coords.longitude;

            // Create flag only once
            if (flagLat === null) {

                // About 100-300m random offset
                const latOffset =
                    (Math.random() - 0.5) * 0.004;

                const lonOffset =
                    (Math.random() - 0.5) * 0.004;

                flagLat = lat + latOffset;
                flagLon = lon + lonOffset;

                console.log(
                    "Flag created at:",
                    flagLat,
                    flagLon
                );
            }

            const distance =
                calculateDistance(
                    lat,
                    lon,
                    flagLat,
                    flagLon
                );

            document.getElementById("distance")
                .innerText =
                Math.round(distance) + " m";

            document.getElementById("coords")
                .innerHTML =
                `
                Your GPS:<br>
                ${lat.toFixed(6)},
                ${lon.toFixed(6)}
                `;

            if (distance <= CAPTURE_RADIUS) {

                document.getElementById("status")
                    .innerHTML =
                    "🏆 FLAG CAPTURED!";

            } else {

                document.getElementById("status")
                    .innerHTML =
                    "🚶 Walk to find the flag";
            }
        },

        function(error) {

            document.getElementById("status")
                .innerText =
                "Location access denied";
        },

        {
            enableHighAccuracy: true,
            maximumAge: 0,
            timeout: 10000
        }
    );
}

</script>

</body>
</html>
