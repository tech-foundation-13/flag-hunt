<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flag Hunt Arrow</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    text-align:center;
}

.container{
    padding:20px;
}

#arrow{
    font-size:120px;
    transition:transform 0.3s linear;
    margin:20px 0;
}

#distance{
    font-size:42px;
    color:#00ff88;
}

#status{
    font-size:24px;
    margin-top:20px;
}

#debug{
    margin-top:20px;
    color:#999;
    font-size:14px;
}
</style>
</head>
<body>

<div class="container">

    <h1>🏁 Flag Hunt</h1>

    <div id="arrow">⬆</div>

    <div id="distance">-- m</div>

    <div id="status">
        Getting GPS...
    </div>

    <div id="debug"></div>

</div>

<script>

let playerLat;
let playerLon;

let flagLat = null;
let flagLon = null;

let heading = 0;

const CAPTURE_RADIUS = 10;

// Distance in meters
function calculateDistance(
    lat1, lon1,
    lat2, lon2
){
    const R = 6371000;

    const dLat =
        (lat2-lat1)*Math.PI/180;

    const dLon =
        (lon2-lon1)*Math.PI/180;

    const a =
        Math.sin(dLat/2) *
        Math.sin(dLat/2)
        +
        Math.cos(lat1*Math.PI/180)
        *
        Math.cos(lat2*Math.PI/180)
        *
        Math.sin(dLon/2)
        *
        Math.sin(dLon/2);

    const c =
        2 *
        Math.atan2(
            Math.sqrt(a),
            Math.sqrt(1-a)
        );

    return R*c;
}

// Bearing to target
function calculateBearing(
    lat1, lon1,
    lat2, lon2
){

    const y =
        Math.sin(
            (lon2-lon1) *
            Math.PI/180
        ) *
        Math.cos(
            lat2 *
            Math.PI/180
        );

    const x =
        Math.cos(
            lat1 *
            Math.PI/180
        ) *
        Math.sin(
            lat2 *
            Math.PI/180
        )
        -
        Math.sin(
            lat1 *
            Math.PI/180
        ) *
        Math.cos(
            lat2 *
            Math.PI/180
        ) *
        Math.cos(
            (lon2-lon1) *
            Math.PI/180
        );

    let brng =
        Math.atan2(y,x)
        *
        180/Math.PI;

    return (brng+360)%360;
}

function updateGame(){

    if(
        playerLat === undefined ||
        flagLat === null
    ){
        return;
    }

    const dist =
        calculateDistance(
            playerLat,
            playerLon,
            flagLat,
            flagLon
        );

    document.getElementById(
        "distance"
    ).textContent =
        Math.round(dist) + " m";

    const flagBearing =
        calculateBearing(
            playerLat,
            playerLon,
            flagLat,
            flagLon
        );

    const relativeAngle =
        (flagBearing - heading + 360)
        % 360;

    document.getElementById(
        "arrow"
    ).style.transform =
        `rotate(${relativeAngle}deg)`;

    if(
        dist <= CAPTURE_RADIUS
    ){

        document.getElementById(
            "status"
        ).innerHTML =
            "🏆 FLAG CAPTURED!";

    } else {

        document.getElementById(
            "status"
        ).innerHTML =
            "🚶 Follow the arrow";
    }
}

// GPS
navigator.geolocation.watchPosition(

position => {

    playerLat =
        position.coords.latitude;

    playerLon =
        position.coords.longitude;

    // Create random flag once
    if(flagLat === null){

        const latOffset =
            (Math.random()-0.5)
            * 0.004;

        const lonOffset =
            (Math.random()-0.5)
            * 0.004;

        flagLat =
            playerLat +
            latOffset;

        flagLon =
            playerLon +
            lonOffset;

        console.log(
            "Flag:",
            flagLat,
            flagLon
        );
    }

    updateGame();

},

error => {

    document.getElementById(
        "status"
    ).innerHTML =
        "Location permission required";

},

{
    enableHighAccuracy:true,
    maximumAge:0,
    timeout:10000
}
);

// Compass
window.addEventListener(
    "deviceorientationabsolute",
    handleOrientation,
    true
);

window.addEventListener(
    "deviceorientation",
    handleOrientation,
    true
);

function handleOrientation(event){

    if(event.alpha != null){

        heading =
            360 - event.alpha;

        updateGame();
    }
}

</script>

</body>
</html>
